<!DOCTYPE html>
<html>
<head>
  <title>{{title}}</title>
  <style>
    body {
      background-color: {{color}};
      font-family: Arial, sans-serif;
      padding: 40px;
      color: #ffffff;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{title}}</h1>
    <p>{{description}}</p>
  </div>
</body>
</html>
